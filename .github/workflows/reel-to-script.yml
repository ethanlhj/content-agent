name: Reel to script (on demand)

on:
  workflow_dispatch:
    inputs:
      reel_url:
        description: "Instagram reel URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg

      - name: Cache whisper.cpp build + model
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: |
            whisper.cpp/build/bin/whisper-cli
            whisper.cpp/models/ggml-base.en.bin
          key: whisper-cpp-base-en-v1

      - name: Build whisper.cpp + download model
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j --target whisper-cli
          bash ./models/download-ggml-model.sh base.en

      - name: Write .env from secrets
        env:
          ENV_FILE: ${{ secrets.ENV }}
        run: printf '%s\n' "$ENV_FILE" > .env

      - name: Fetch, transcribe, script
        env:
          WHISPER_CLI: ${{ github.workspace }}/whisper.cpp/build/bin/whisper-cli
          WHISPER_MODEL: ${{ github.workspace }}/whisper.cpp/models/ggml-base.en.bin
        run: |
          node scripts/reel-to-script/fetch.js "${{ inputs.reel_url }}"
          node scripts/reel-to-script/transcribe.js
          node scripts/reel-to-script/rewrite.js
          node scripts/reel-to-script/output.js
          node scripts/reel-to-script/view.js

      - name: Show transcript in run summary
        run: |
          echo "## Transcript" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat scripts/reel-to-script/last_transcript.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Commit results
        run: |
          rm -f .env
          git config user.name "content-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/ dashboard/scripts_data.js scripts/reel-to-script/last_*.json scripts/reel-to-script/last_*.txt || true
          git diff --cached --quiet || git commit -m "script: on-demand reel $(date -u +%F)"
          git push
